name: Citrea Frontend DEV CI/CD

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DOCKER_TAGS: dfxswiss/citrea-frontend:beta

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          platforms: linux/amd64,linux/arm64

  deploy:
    name: Deploy to dfxdev
    needs: build
    runs-on: [self-hosted, dfxdev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update env files
        run: |
          cp .env.dev ~/citrea/env/citrea-frontend.env

      - name: Pull and restart
        run: |
          cd ~/citrea
          docker compose pull citrea-frontend
          docker compose up -d citrea-frontend
